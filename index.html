```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pocket Ledger Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6a0dad">

<link rel="icon" href="icons/favicon.ico">
<link rel="apple-touch-icon" href="icons/icon-180.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:linear-gradient(135deg,#6a0dad,#6f6f6f);
color:white;
}

header{
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

nav{
display:flex;
gap:8px;
padding:10px;
}

nav button{
flex:1;
padding:10px;
border:none;
border-radius:6px;
background:#2d2d2d;
color:white;
}

section{
padding:15px;
display:none;
}

section.active{
display:block;
}

.card{
background:rgba(0,0,0,0.35);
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:none;
}

button.primary{
background:#a855ff;
}

.transaction{
display:flex;
justify-content:space-between;
padding:6px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.balance{
font-size:26px;
text-align:center;
margin-bottom:10px;
font-weight:bold;
}

</style>

</head>

<body>

<header>Pocket Ledger Pro</header>

<div class="balance" id="balance">$0</div>

<nav>
<button onclick="showTab('ledger')">Ledger</button>
<button onclick="showTab('calendar')">Calendar</button>
<button onclick="showTab('debts')">Debts</button>
<button onclick="showTab('charts')">Charts</button>
<button onclick="showTab('settings')">Settings</button>
</nav>

<section id="ledger" class="active">

<div class="card">

<input id="desc" placeholder="Description">

<input id="amount" type="number" placeholder="Amount">

<select id="type">
<option value="income">Money In</option>
<option value="expense">Money Out</option>
<option value="owed">Owed To Me</option>
<option value="owe">I Owe</option>
</select>

<input type="date" id="date">

<button class="primary" onclick="addTransaction()">Add Transaction</button>

</div>

<div class="card">

<input id="search" placeholder="Search..." oninput="renderTransactions()">

<div id="transactions"></div>

</div>

</section>

<section id="calendar">

<div class="card">

<input type="date" id="calendarDate" onchange="calendarView()">

<div id="calendarResults"></div>

</div>

</section>

<section id="debts">

<div class="card">

<h3>Debt List</h3>

<div id="debtList"></div>

</div>

</section>

<section id="charts">

<div class="card">

<canvas id="chart"></canvas>

</div>

</section>

<section id="settings">

<div class="card">

<button onclick="exportBackup()">Export Backup</button>

<input type="file" onchange="importBackup(event)">

<button onclick="exportCSV()">Export CSV</button>

</div>

</section>

<script>

let ledger = JSON.parse(localStorage.getItem("ledger")||"[]")

function save(){

localStorage.setItem("ledger",JSON.stringify(ledger))
renderTransactions()

}

function showTab(tab){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))
document.getElementById(tab).classList.add("active")

}

function addTransaction(){

let tx={
id:Date.now(),
desc:desc.value,
amount:Number(amount.value),
type:type.value,
date:date.value
}

ledger.push(tx)

save()

desc.value=""
amount.value=""

}

function renderTransactions(){

let container=document.getElementById("transactions")
container.innerHTML=""

let searchVal=search.value?.toLowerCase()||""

let balance=0

ledger.forEach(t=>{

if(searchVal && !t.desc.toLowerCase().includes(searchVal)) return

if(t.type==="income") balance+=t.amount
if(t.type==="expense") balance-=t.amount

let div=document.createElement("div")
div.className="transaction"

div.innerHTML=`<span>${t.desc}</span><span>$${t.amount}</span>`

container.appendChild(div)

})

balanceEl=document.getElementById("balance")
balanceEl.innerText="$"+balance

renderDebts()
renderChart()

}

function renderDebts(){

let el=document.getElementById("debtList")
el.innerHTML=""

ledger.filter(t=>t.type==="owed"||t.type==="owe")
.forEach(t=>{

el.innerHTML+=`<div class="transaction">${t.desc} $${t.amount}</div>`

})

}

function calendarView(){

let date=document.getElementById("calendarDate").value
let res=document.getElementById("calendarResults")

res.innerHTML=""

ledger.filter(t=>t.date===date)
.forEach(t=>{

res.innerHTML+=`<div>${t.desc} $${t.amount}</div>`

})

}

let chart

function renderChart(){

let income=0
let expense=0

ledger.forEach(t=>{

if(t.type==="income") income+=t.amount
if(t.type==="expense") expense+=t.amount

})

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"pie",
data:{
labels:["Income","Expense"],
datasets:[{
data:[income,expense]
}]
}
})

}

function exportCSV(){

let csv="desc,amount,type,date\n"

ledger.forEach(t=>{
csv+=`${t.desc},${t.amount},${t.type},${t.date}\n`
})

let blob=new Blob([csv])

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="ledger.csv"
a.click()

}

function exportBackup(){

let blob=new Blob([JSON.stringify(ledger)])

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="ledger-backup.json"
a.click()

}

function importBackup(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=()=>{

ledger=JSON.parse(reader.result)

save()

}

reader.readAsText(file)

}

renderTransactions()

</script>

</body>
</html>
```
